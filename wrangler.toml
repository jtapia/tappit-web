name = "tappit-web"
main = "./worker/index.ts"
compatibility_date = "2026-04-06"

routes = [
  { pattern = "gettappit.com", custom_domain = true, zone_name = "gettappit.com" }
]

[assets]
directory = "./out"
binding = "ASSETS"

# Secrets (set via `wrangler secret put`, never commit here):
#   LICENSE_SIGNING_PRIVATE_KEY
[vars]
PURCHASE_URL = "https://buy.stripe.com/test_7sYeVeeiu5ZU8Tpb8G1kA00"
NEXT_PUBLIC_STRIPE_PAYMENT_LINK = "https://buy.stripe.com/test_7sYeVeeiu5ZU8Tpb8G1kA00"
NEXT_PUBLIC_LICENSE_ISSUER_URL="https://license.gettappit.com"
NEXT_PUBLIC_DOWNLOAD_URL="https://github.com/jtapia/TappitX-releases/releases/download/v1.0.0/TappitX-1.0.0.dmg"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
